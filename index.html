<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guna's Craft Digital Catalog</title>
<style>
  :root {
    --ink: #26190f;
    --muted: #7a654a;
    --gold: #c99b36;
    --gold-soft: #e9d59a;
    --paper: #fffdf8;
    --surface: #ffffff;
    --line: rgba(38, 25, 15, 0.14);
    --shadow: 0 20px 60px rgba(28, 18, 10, 0.16);
    --turn-shadow: 0;
  }

  * {
    box-sizing: border-box;
  }

  html {
    min-height: 100%;
  }

  body {
    min-height: 100vh;
    margin: 0;
    color: var(--ink);
    background:
      radial-gradient(circle at top, rgba(201, 155, 54, 0.12), transparent 34rem),
      linear-gradient(180deg, #ffffff 0%, #fbfaf7 100%);
    font-family: Georgia, "Times New Roman", serif;
  }

  button {
    font: inherit;
  }

  .site-header {
    display: flex;
    justify-content: center;
    padding: 16px 16px 10px;
  }

  .brand {
    display: block;
    text-decoration: none;
  }

  .brand-logo {
    display: block;
    width: min(520px, 86vw);
    height: auto;
    object-fit: contain;
  }

  .catalog {
    width: min(1360px, 100%);
    margin: 0 auto;
    padding: 0 16px 24px;
  }

  .viewer {
    width: 100%;
  }

  .viewer-bar {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 12px;
    margin: 8px auto 14px;
    width: min(1180px, 100%);
  }

  .page-status {
    justify-self: center;
    color: var(--muted);
    font-size: 13px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }

  .control-group {
    display: flex;
    gap: 8px;
  }

  .control-group.right {
    justify-self: end;
  }

  .control {
    min-width: 42px;
    height: 38px;
    padding: 0 12px;
    border: 1px solid rgba(201, 155, 54, 0.42);
    border-radius: 999px;
    color: var(--ink);
    background: rgba(255, 255, 255, 0.82);
    box-shadow: 0 3px 14px rgba(28, 18, 10, 0.06);
    cursor: pointer;
    transition: transform 160ms ease, border-color 160ms ease, background 160ms ease, opacity 160ms ease;
  }

  .control:hover:not(:disabled) {
    transform: translateY(-1px);
    border-color: var(--gold);
    background: #fffaf0;
  }

  .control:disabled {
    cursor: not-allowed;
    opacity: 0.36;
  }

  .book-row {
    display: grid;
    grid-template-columns: auto minmax(0, 1180px) auto;
    justify-content: center;
    align-items: center;
    gap: 18px;
  }

  .side-control {
    display: grid;
    place-items: center;
    width: clamp(42px, 5vw, 54px);
    height: clamp(42px, 5vw, 54px);
    padding: 0;
    border-radius: 50%;
    font-size: 24px;
  }

  .book {
    position: relative;
    width: 100%;
    aspect-ratio: 3 / 1;
    overflow: hidden;
    border: 1px solid rgba(38, 25, 15, 0.1);
    border-radius: 10px;
    background: #e7dcc7;
    box-shadow: var(--shadow);
    cursor: grab;
    perspective: 2400px;
    user-select: none;
    touch-action: pan-y;
  }

  .book.dragging {
    cursor: grabbing;
  }

  .book::before {
    content: "";
    position: absolute;
    inset: 0;
    z-index: 4;
    pointer-events: none;
    background:
      linear-gradient(90deg, rgba(0,0,0,0.1), transparent 5%, transparent 95%, rgba(0,0,0,0.1)),
      linear-gradient(180deg, rgba(255,255,255,0.22), transparent 18%, transparent 82%, rgba(0,0,0,0.08));
    mix-blend-mode: multiply;
  }

  .book::after {
    content: "";
    position: absolute;
    inset: 0;
    z-index: 8;
    opacity: var(--turn-shadow);
    pointer-events: none;
    background:
      radial-gradient(circle at 50% 52%, transparent 34%, rgba(0,0,0,0.32) 100%),
      linear-gradient(90deg, rgba(0,0,0,0.12), transparent 17%, transparent 83%, rgba(0,0,0,0.12));
    transition: opacity 120ms linear;
  }

  .page-frame,
  .turn-layer {
    position: absolute;
    inset: 0;
  }

  .page-frame {
    z-index: 1;
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
    overflow: hidden;
  }

  .spread-page {
    position: relative;
    margin: 0;
    overflow: hidden;
    background: var(--paper);
  }

  .spread-page.left {
    border-right: 1px solid rgba(38, 25, 15, 0.12);
    box-shadow: inset -16px 0 26px rgba(45, 31, 16, 0.1);
  }

  .spread-page.right {
    border-left: 1px solid rgba(255, 255, 255, 0.58);
    box-shadow: inset 16px 0 26px rgba(45, 31, 16, 0.1);
  }

  .page-image {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: cover;
    transform-origin: center center;
    transition: transform 200ms ease;
    -webkit-user-drag: none;
  }

  .spine {
    position: absolute;
    top: 0;
    bottom: 0;
    left: 50%;
    z-index: 6;
    width: 28px;
    pointer-events: none;
    transform: translateX(-50%);
    background:
      linear-gradient(90deg, rgba(0,0,0,0.18), rgba(255,255,255,0.35) 38%, rgba(0,0,0,0.16) 50%, rgba(255,255,255,0.35) 62%, rgba(0,0,0,0.18));
    opacity: 0.72;
    mix-blend-mode: multiply;
  }

  .turn-layer {
    z-index: 7;
    display: block;
    overflow: visible;
    pointer-events: none;
    transform-style: preserve-3d;
  }

  .turn-layer[hidden] {
    display: none;
  }

  .turn-page {
    position: absolute;
    top: 0;
    width: 50%;
    height: 100%;
    transform-style: preserve-3d;
    will-change: transform;
  }

  .turn-page.next {
    left: 50%;
    transform-origin: left center;
  }

  .turn-page.prev {
    left: 0;
    transform-origin: right center;
  }

  .turn-face {
    position: absolute;
    inset: 0;
    overflow: hidden;
    background: var(--paper);
    backface-visibility: hidden;
    box-shadow: 0 0 24px rgba(45, 31, 16, 0.14);
  }

  .turn-face.back {
    transform: rotateY(180deg);
  }

  .turn-face img {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: cover;
    -webkit-user-drag: none;
  }

  .turn-face::after {
    content: "";
    position: absolute;
    inset: 0;
    opacity: var(--page-shade, 0);
    pointer-events: none;
    background:
      linear-gradient(90deg, rgba(255,255,255,0.5), transparent 42%, rgba(0,0,0,0.5));
    mix-blend-mode: multiply;
  }

  .book-hit {
    position: absolute;
    top: 0;
    z-index: 9;
    width: 50%;
    height: 100%;
    border: 0;
    padding: 0;
    background: transparent;
    cursor: pointer;
  }

  .book-hit::before {
    content: "";
    position: absolute;
    top: 50%;
    display: none;
    width: 42px;
    height: 42px;
    place-items: center;
    border: 1px solid rgba(201, 155, 54, 0.55);
    border-radius: 999px;
    color: #8f641b;
    background: rgba(255, 253, 248, 0.84);
    box-shadow: 0 8px 22px rgba(28, 18, 10, 0.14);
    font: 28px/1 Georgia, "Times New Roman", serif;
    opacity: 0.7;
    transform: translateY(-50%);
    transition: opacity 160ms ease, transform 160ms ease, background 160ms ease;
  }

  .book-hit:hover::before,
  .book-hit:focus-visible::before {
    opacity: 1;
    background: #fffaf0;
  }

  .book-hit:disabled {
    cursor: not-allowed;
  }

  .book-hit:disabled::before {
    opacity: 0.18;
  }

  .book-hit.left {
    left: 0;
  }

  .book-hit.left::before {
    content: "<";
    left: 14px;
  }

  .book-hit.left:hover::before,
  .book-hit.left:focus-visible::before {
    transform: translate(-4px, -50%);
  }

  .book-hit.right {
    right: 0;
  }

  .book-hit.right::before {
    content: ">";
    right: 14px;
  }

  .book-hit.right:hover::before,
  .book-hit.right:focus-visible::before {
    transform: translate(4px, -50%);
  }

  .progress {
    width: min(1180px, 100%);
    height: 4px;
    margin: 14px auto 0;
    overflow: hidden;
    border-radius: 999px;
    background: rgba(201, 155, 54, 0.16);
  }

  .progress-fill {
    width: 0;
    height: 100%;
    border-radius: inherit;
    background: linear-gradient(90deg, var(--gold), var(--gold-soft));
    transition: width 260ms ease;
  }

  .thumb-strip {
    display: flex;
    gap: 8px;
    width: min(1180px, 100%);
    margin: 16px auto 0;
    padding: 2px 0 10px;
    overflow-x: auto;
    scrollbar-width: thin;
    scrollbar-color: rgba(201, 155, 54, 0.44) transparent;
  }

  .thumb {
    position: relative;
    flex: 0 0 clamp(74px, 9vw, 112px);
    aspect-ratio: 3 / 2;
    overflow: hidden;
    border: 2px solid transparent;
    border-radius: 6px;
    background: #f4efe3;
    cursor: pointer;
    opacity: 0.72;
    transition: opacity 160ms ease, transform 160ms ease, border-color 160ms ease, box-shadow 160ms ease;
  }

  .thumb:hover,
  .thumb.active {
    opacity: 1;
    transform: translateY(-1px);
  }

  .thumb.active {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(201, 155, 54, 0.14);
  }

  .thumb img {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: cover;
  }

  .thumb span {
    position: absolute;
    right: 4px;
    bottom: 3px;
    min-width: 18px;
    padding: 1px 4px;
    border-radius: 999px;
    color: var(--ink);
    background: rgba(255, 255, 255, 0.86);
    font: 10px/1.4 Arial, sans-serif;
    text-align: center;
  }

  .lightbox {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: grid;
    grid-template-rows: auto minmax(0, 1fr);
    gap: 12px;
    padding: 14px;
    background: rgba(12, 10, 8, 0.96);
  }

  .lightbox[hidden] {
    display: none;
  }

  .lightbox-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    color: #f6e7bd;
  }

  .lightbox-title {
    min-width: min(360px, 45vw);
    color: rgba(255,255,255,0.78);
    font-size: 13px;
    letter-spacing: 0.12em;
    text-align: center;
    text-transform: uppercase;
  }

  .lightbox-stage {
    display: grid;
    place-items: center;
    min-height: 0;
    overflow: hidden;
  }

  .lightbox-img {
    max-width: 96vw;
    max-height: calc(100vh - 92px);
    object-fit: contain;
    border-radius: 6px;
    box-shadow: 0 0 70px rgba(0,0,0,0.66);
    transform-origin: center center;
    transition: transform 180ms ease;
  }

  .sr-only {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
  }

  .mobile-craft {
    display: none;
  }

  @media (max-width: 760px) {
    body {
      display: flex;
      min-height: 100vh;
      min-height: 100svh;
      flex-direction: column;
      justify-content: space-between;
      overflow-x: hidden;
      padding-block: 10px;
    }

    .mobile-craft {
      display: flex;
      width: min(370px, calc(100vw - 20px));
      margin-inline: auto;
      align-items: center;
      justify-content: center;
      gap: 7px;
    }

    .mobile-craft-top {
      margin-bottom: 8px;
    }

    .mobile-craft-bottom {
      margin-top: 10px;
    }

    .craft-jump {
      display: grid;
      min-width: 0;
      grid-template-columns: 24px minmax(0, 1fr);
      align-items: center;
      gap: 5px;
      padding: 5px 8px;
      border: 1px solid rgba(201, 155, 54, 0.3);
      border-radius: 999px;
      color: #4a3218;
      background: rgba(255, 253, 248, 0.84);
      box-shadow: 0 7px 20px rgba(28, 18, 10, 0.07);
      font: 10px/1.1 Arial, sans-serif;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
    }

    .craft-jump span:last-child {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .craft-jump:hover,
    .craft-jump:focus-visible,
    .craft-jump.active {
      border-color: rgba(201, 155, 54, 0.72);
      background: #fff8e8;
      transform: translateY(-1px);
    }

    .coil-icon {
      position: relative;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background:
        radial-gradient(circle at center, #fffdf8 0 22%, transparent 23%),
        conic-gradient(#f7941d, #c99b36, #24456e, #f7941d);
      box-shadow: inset 0 0 0 4px rgba(255, 253, 248, 0.9), 0 2px 8px rgba(28, 18, 10, 0.12);
    }

    .coil-icon::after {
      content: "";
      position: absolute;
      inset: 8px 4px 8px 16px;
      border-radius: 999px;
      background: #24456e;
      transform: rotate(-28deg);
      transform-origin: left center;
    }

    .coil-icon.rose {
      background:
        radial-gradient(circle at center, #fffdf8 0 22%, transparent 23%),
        conic-gradient(#bb405c, #e9d59a, #f7941d, #bb405c);
    }

    .coil-icon.green {
      background:
        radial-gradient(circle at center, #fffdf8 0 22%, transparent 23%),
        conic-gradient(#2f6d4f, #d8b44a, #24456e, #2f6d4f);
    }

    .craft-jump:hover .coil-icon,
    .craft-jump:focus-visible .coil-icon,
    .craft-jump.active .coil-icon {
      animation: coil-turn 820ms ease;
    }

    @keyframes coil-turn {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .site-header {
      flex: 0 0 auto;
      padding: 0 10px 6px;
    }

    .brand-logo {
      width: min(260px, 88vw);
    }

    .catalog {
      flex: 0 1 auto;
      padding: 0 10px;
    }

    .viewer {
      display: grid;
      justify-items: center;
    }

    .viewer-bar {
      grid-template-columns: 1fr;
      justify-items: center;
      gap: 6px;
      margin: 4px auto 10px;
    }

    .page-status {
      font-size: 11px;
      letter-spacing: 0.12em;
    }

    .control {
      min-width: 36px;
      height: 32px;
      padding: 0 10px;
      font-size: 12px;
    }

    .control-group,
    .control-group.right {
      justify-self: center;
    }

    .book-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px 14px;
      width: 100%;
    }

    .side-control {
      order: 2;
      display: grid;
      width: 42px;
      height: 42px;
      min-width: 42px;
      place-items: center;
      padding: 0;
      font-size: 25px;
    }

    .book {
      order: 1;
      flex: 0 0 min(100%, 640px);
      width: min(100%, 640px);
      margin: 0 auto;
      aspect-ratio: 3 / 2;
      border-radius: 8px;
      perspective: 1800px;
    }

    .page-image,
    .turn-face img {
      object-fit: contain;
      background: var(--paper);
    }

    .page-frame {
      display: block;
    }

    .spread-page {
      position: absolute;
      inset: 0;
    }

    .spread-page.left {
      border-right: 0;
      box-shadow: none;
    }

    .spread-page.right,
    .spine {
      display: none;
    }

    .turn-page {
      width: 100%;
    }

    .turn-page.next,
    .turn-page.prev {
      left: 0;
    }

    .turn-page.next {
      transform-origin: right center;
    }

    .turn-page.prev {
      transform-origin: left center;
    }

    .book-hit {
      width: 50%;
    }

    .book-hit::before {
      display: none;
    }

    .progress {
      margin-top: 12px;
    }

    .thumb {
      flex-basis: clamp(70px, 22vw, 98px);
    }

    .thumb-strip {
      width: 100%;
      margin-top: 12px;
      gap: 7px;
      padding-bottom: 8px;
    }

    .lightbox {
      padding: 10px;
    }

    .lightbox-bar {
      flex-wrap: wrap;
    }

    .lightbox-title {
      order: 3;
      width: 100%;
      min-width: 0;
    }
  }

  @media (prefers-reduced-motion: reduce) {
    .control,
    .craft-jump,
    .page-image,
    .progress-fill,
    .thumb,
    .lightbox-img {
      transition: none;
    }

    .coil-icon {
      animation: none !important;
    }
  }
</style>
</head>

  <header class="site-header">

  <main class="catalog">
    <section class="viewer" aria-label="Guna's Craft flipbook catalog">

        <div class="control-group">
          <button class="control" id="prev-top" type="button" aria-label="Previous page">Prev</button>
          <button class="control" id="next-top" type="button" aria-label="Next page">Next</button>

        <div class="page-status" id="page-status" aria-live="polite">Page 1 of 20</div>
        <div class="control-group right">
          <button class="control" id="zoom-out" type="button" aria-label="Zoom out">-</button>

  </main>

  <nav class="mobile-craft mobile-craft-bottom" aria-label="More handmade catalog links">
    <button class="craft-jump" type="button" data-page="14">
      <span class="coil-icon green" aria-hidden="true"></span>
      <span>Divine</span>
    </button>
    <button class="craft-jump" type="button" data-page="19">
      <span class="coil-icon rose" aria-hidden="true"></span>
      <span>Awards</span>
    </button>
    <button class="craft-jump" type="button" data-page="20">
      <span class="coil-icon" aria-hidden="true"></span>
      <span>Contact</span>
    </button>
  </nav>

  <div class="lightbox" id="lightbox" hidden role="dialog" aria-modal="true" aria-label="Fullscreen catalog page">
    <div class="lightbox-bar">
      <button class="control" id="lightbox-prev" type="button" aria-label="Previous page">Prev</button>
      <button class="control" id="lightbox-zoom-out" type="button" aria-label="Zoom out">-</button>
      <button class="control" id="lightbox-zoom-in" type="button" aria-label="Zoom in">+</button>
      <div class="lightbox-title" id="lightbox-title"></div>
      <button class="control" id="lightbox-next" type="button" aria-label="Next page">Next</button>
      <button class="control" id="lightbox-close" type="button" aria-label="Close fullscreen">Close</button>
    </div>
    <div class="lightbox-stage" id="lightbox-stage">
      <img class="lightbox-img" id="lightbox-img" alt="" draggable="false">
    </div>
  </div>

<script>
let PAGES = [
  { src: "assets/pages/page-01.jpg", label: "Cover - Guna's Craft" },
  { src: "assets/pages/page-02.jpg?v=custom-0002", label: "About the Artist" },
  { src: "assets/pages/page-03.jpg", label: "Sacred Strips of Devotion" },

  { src: "assets/pages/page-05.jpg", label: "Silent Majesty" },
  { src: "assets/pages/page-06.jpg", label: "The Royal Plume" },
  { src: "assets/pages/page-07.jpg", label: "Strength in Stillness" },
  { src: "assets/pages/page-08.jpg", label: "A Portrait of Strength" },
  { src: "assets/pages/page-09.jpg", label: "Symphony of Nature" },
  { src: "assets/pages/page-10.jpg", label: "Peckaboo Puppy, Tropical Dream and Peacock Pride" },
  { src: "assets/pages/page-11.jpg", label: "Radiant Rooster, Moonlit Ember and Festive Grace" },
  { src: "assets/pages/page-12.jpg", label: "Hidden Melody, Soul Tree and Golden Cockerel" },
  { src: "assets/pages/page-13.jpg", label: "Violet Serenade, Sapphire Dream and Sunburst Bird" },
  { src: "assets/pages/page-14.jpg", label: "Divine Art" },
  { src: "assets/pages/page-15.jpg", label: "Art Made with Devotion Brings Blessings to Every Home" },
  { src: "assets/pages/page-16.jpg", label: "Customized Gifts and Name Boards" },
  { src: "assets/pages/page-17.jpg", label: "Spiritual Collection" },
  { src: "assets/pages/page-18.jpg", label: "Miniature and Table-top Gifts" },
  { src: "assets/pages/page-19.jpg", label: "Awards and Recognitions" },
  { src: "assets/pages/page-20.jpg", label: "Get in Touch" }
];

const TURN_MS = 760;
const clamp = (value, min, max) => Math.max(min, Math.min(max, value));
const ease = (t) => t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;

const book = document.getElementById("book");
const leftPageImage = document.getElementById("left-page-image");
const rightPageImage = document.getElementById("right-page-image");
const turnLayer = document.getElementById("turn-layer");
const statusEl = document.getElementById("page-status");
const progressFill = document.getElementById("progress-fill");
const thumbStrip = document.getElementById("thumb-strip");
const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightbox-img");
const lightboxTitle = document.getElementById("lightbox-title");
const craftJumps = [...document.querySelectorAll(".craft-jump")];
const mobileQuery = window.matchMedia("(max-width: 760px)");

const controls = {
  prev: [
    document.getElementById("prev-top"),
    document.getElementById("prev-side"),
    document.getElementById("hit-prev"),
    document.getElementById("lightbox-prev")
  ],
  next: [
    document.getElementById("next-top"),
    document.getElementById("next-side"),
    document.getElementById("hit-next"),
    document.getElementById("lightbox-next")
  ],
  zoomOut: [
    document.getElementById("zoom-out"),
    document.getElementById("lightbox-zoom-out")
  ],
  zoomIn: [
    document.getElementById("zoom-in"),
    document.getElementById("lightbox-zoom-in")
  ]
};

let currentIndex = 0;
let isTurning = false;
let activeTurn = null;
let dragState = null;
let zoomLevel = 1;
let catalogVersion = null;
let catalogPollTimer = null;

function normalizeCatalogPages(pages) {
  if (!Array.isArray(pages) || !pages.length) return PAGES;
  return pages
    .filter((page) => page && page.src)
    .map((page, index) => ({
      src: page.src,
      label: page.label || `Catalog page ${index + 1}`,
      id: page.id || `page-${index + 1}`
    }));
}

function updateCatalog(catalog) {
  const pages = normalizeCatalogPages(catalog.pages);
  if (!pages.length) return;
  if (catalog.version && catalog.version === catalogVersion && pages.length === PAGES.length) return;
  catalogVersion = catalog.version || Date.now();
  PAGES = pages;
  const targetIndex = clamp(currentIndex, 0, PAGES.length - 1);
  resetZoom();
  buildThumbs();
  render(targetIndex);
}

async function loadCatalog() {
  try {
    const response = await fetch("/api/catalog", { cache: "no-store" });
    if (!response.ok) return;
    updateCatalog(await response.json());
  } catch {
    // Static file fallback keeps the catalog usable without the admin server.
  }
}

function connectCatalogSync() {
  if (!window.EventSource) return;
  try {
    const events = new EventSource("/api/events");
    events.addEventListener("catalog", (event) => {
      updateCatalog(JSON.parse(event.data));
    });
  } catch {
    // Live sync is optional; manual reload still works on static hosts.
  }
}

function startCatalogPolling() {
  if (catalogPollTimer) return;
  catalogPollTimer = window.setInterval(loadCatalog, 3000);
}

function spreadStart(index) {
  return clamp(index - (index % 2), 0, Math.max(0, PAGES.length - 1));
}

function isMobileView() {
  return mobileQuery.matches;
}

function displayStart(index) {
  return isMobileView() ? clamp(index, 0, PAGES.length - 1) : spreadStart(index);
}

function spreadLabel(index) {
  if (isMobileView()) {
    return `Page ${index + 1} of ${PAGES.length}`;
  }
  const start = index + 1;
  const end = Math.min(index + 2, PAGES.length);
  return start === end ? `Page ${start} of ${PAGES.length}` : `Pages ${start}-${end} of ${PAGES.length}`;
}

function setSpreadImages(index) {
  const leftPage = PAGES[index];
  const rightPage = PAGES[index + 1];

  leftPageImage.src = leftPage.src;
  leftPageImage.alt = leftPage.label;

  if (isMobileView()) {
    rightPageImage.removeAttribute("src");
    rightPageImage.alt = "";
    rightPageImage.style.visibility = "hidden";
    if (!lightbox.hidden) {
      lightboxImg.src = leftPage.src;
      lightboxImg.alt = leftPage.label;
      lightboxTitle.textContent = `${spreadLabel(index)} - ${leftPage.label}`;
    }
    return;
  }

  if (rightPage) {
    rightPageImage.src = rightPage.src;
    rightPageImage.alt = rightPage.label;
    rightPageImage.style.visibility = "visible";
  } else {
    rightPageImage.removeAttribute("src");
    rightPageImage.alt = "";
    rightPageImage.style.visibility = "hidden";
  }

  if (!lightbox.hidden) {
    lightboxImg.src = leftPage.src;
    lightboxImg.alt = leftPage.label;
    lightboxTitle.textContent = `${spreadLabel(index)} - ${leftPage.label}`;
  }
}

function updateUI() {
  const spreadEnd = Math.min(currentIndex + (isMobileView() ? 1 : 2), PAGES.length);
  statusEl.textContent = spreadLabel(currentIndex);
  progressFill.style.width = `${(spreadEnd / PAGES.length) * 100}%`;

  controls.prev.forEach((button) => {
    button.disabled = currentIndex === 0 || isTurning;
  });
  controls.next.forEach((button) => {
    button.disabled = currentIndex + (isMobileView() ? 1 : 2) >= PAGES.length || isTurning;
  });

  [...thumbStrip.children].forEach((thumb, index) => {
    const active = isMobileView()
      ? index === currentIndex
      : index === currentIndex || index === currentIndex + 1;
    thumb.classList.toggle("active", active);
    thumb.setAttribute("aria-current", active ? "page" : "false");
  });

  craftJumps.forEach((button) => {
    const target = Number(button.dataset.page) - 1;
    const active = isMobileView()
      ? target === currentIndex
      : target === currentIndex || target === currentIndex + 1;
    button.classList.toggle("active", active);
    button.setAttribute("aria-current", active ? "page" : "false");
  });

  const activeThumb = thumbStrip.querySelector(".thumb.active");
  if (activeThumb) {
    activeThumb.scrollIntoView({ behavior: "smooth", block: "nearest", inline: isMobileView() ? "center" : "nearest" });
  }
}

function preloadAround(index) {
  for (let offset = -4; offset <= 5; offset += 1) {
    const page = PAGES[index + offset];
    if (!page) continue;
    const img = new Image();
    img.src = page.src;
  }
}

function render(index) {
  currentIndex = displayStart(index);
  setSpreadImages(currentIndex);
  preloadAround(currentIndex);
  updateUI();
}

function resetZoom() {
  zoomLevel = 1;
  applyZoom();
}

function applyZoom() {
  leftPageImage.style.transform = `scale(${zoomLevel})`;
  rightPageImage.style.transform = `scale(${zoomLevel})`;
  lightboxImg.style.transform = `scale(${zoomLevel})`;
  controls.zoomOut.forEach((button) => {
    button.disabled = zoomLevel <= 1;
  });
  controls.zoomIn.forEach((button) => {
    button.disabled = zoomLevel >= 2.5;
  });
}

function changeZoom(delta) {
  zoomLevel = clamp(Math.round((zoomLevel + delta) * 100) / 100, 1, 2.5);
  applyZoom();
}

function buildThumbs() {
  thumbStrip.innerHTML = "";
  PAGES.forEach((page, index) => {
    const button = document.createElement("button");
    button.className = "thumb";
    button.type = "button";
    button.title = page.label;
    button.setAttribute("aria-label", `Open page ${index + 1}: ${page.label}`);

    const img = document.createElement("img");
    img.src = page.src;
    img.alt = "";
    img.loading = index < 4 ? "eager" : "lazy";

    const number = document.createElement("span");
    number.textContent = index + 1;

    button.append(img, number);
    button.addEventListener("click", () => goToPage(index));
    thumbStrip.appendChild(button);
  });
}

function createFace(side, page) {
  const face = document.createElement("div");
  face.className = `turn-face ${side}`;
  const image = document.createElement("img");
  image.src = page.src;
  image.alt = page.label;
  image.draggable = false;
  face.appendChild(image);
  return face;
}

function createTurn(targetIndex, direction) {
  const frontPage = isMobileView()
    ? PAGES[currentIndex]
    : direction === "next"
      ? PAGES[currentIndex + 1] || PAGES[currentIndex]
      : PAGES[currentIndex];
  const backPage = isMobileView()
    ? PAGES[targetIndex]
    : direction === "next"
      ? PAGES[targetIndex]
      : PAGES[targetIndex + 1] || PAGES[targetIndex];

  setSpreadImages(targetIndex);
  turnLayer.innerHTML = "";
  turnLayer.hidden = false;

  const page = document.createElement("div");
  page.className = `turn-page ${direction}`;
  page.append(createFace("front", frontPage), createFace("back", backPage));
  turnLayer.appendChild(page);

  activeTurn = { targetIndex, direction, page };
  updateTurnProgress(0);
  return activeTurn;
}

function updateTurnProgress(progress) {
  if (!activeTurn) return;
  const p = clamp(progress, 0, 1);
  const curved = ease(p);
  const direction = activeTurn.direction;
  const angle = (direction === "next" ? -180 : 180) * curved;
  const lift = Math.sin(curved * Math.PI) * 34;
  const skew = Math.sin(curved * Math.PI) * (direction === "next" ? -1.6 : 1.6);
  const shade = 0.1 + Math.sin(curved * Math.PI) * 0.46;
  const shadow = Math.sin(curved * Math.PI);

  activeTurn.page.style.transform = `translateZ(${lift}px) rotateY(${angle}deg) skewY(${skew}deg)`;
  activeTurn.page.style.setProperty("--page-shade", shade.toFixed(3));
  book.style.setProperty("--turn-shadow", (shadow * 0.42).toFixed(3));
}

function animateProgress(from, to, duration, done) {
  const start = Date.now();
  let finished = false;
  const finish = () => {
    if (finished) return;
    finished = true;
    updateTurnProgress(to);
    done();
  };
  const fallback = window.setTimeout(finish, duration + 140);
  const step = () => {
    if (finished) return;
    const elapsed = clamp((Date.now() - start) / duration, 0, 1);
    const value = from + (to - from) * ease(elapsed);
    updateTurnProgress(value);
    if (elapsed < 1) {
      requestAnimationFrame(step);
      return;
    }
    window.clearTimeout(fallback);
    finish();
  };
  requestAnimationFrame(step);
}

function finishTurn(complete) {
  if (complete && activeTurn) {
    currentIndex = activeTurn.targetIndex;
  } else {
    setSpreadImages(currentIndex);
  }
  turnLayer.hidden = true;
  turnLayer.innerHTML = "";
  activeTurn = null;
  isTurning = false;
  book.style.setProperty("--turn-shadow", "0");
  preloadAround(currentIndex);
  updateUI();
}

function turnTo(targetIndex, direction, startProgress = 0) {
  const target = displayStart(targetIndex);
  if (isTurning || target < 0 || target >= PAGES.length || target === currentIndex) return;
  resetZoom();
  isTurning = true;
  updateUI();
  createTurn(target, direction);
  updateTurnProgress(startProgress);
  animateProgress(startProgress, 1, TURN_MS * (1 - startProgress), () => finishTurn(true));
}

function nextPage() {
  turnTo(currentIndex + (isMobileView() ? 1 : 2), "next");
}

function prevPage() {
  turnTo(currentIndex - (isMobileView() ? 1 : 2), "prev");
}

function goToPage(index) {
  const target = displayStart(index);
  if (target === currentIndex || isTurning) return;
  if (Math.abs(target - currentIndex) === (isMobileView() ? 1 : 2)) {
    turnTo(target, target > currentIndex ? "next" : "prev");
    return;
  }
  resetZoom();
  render(target);
}

function startDrag(event) {
  if (dragState) return;
  if (isTurning || event.button !== 0) return;
  const pointerId = event.pointerId ?? "mouse";
  dragState = {
    pointerId,
    startX: event.clientX,
    startY: event.clientY,
    progress: 0,
    active: false,
    fromHitZone: Boolean(event.target.closest(".book-hit")),
    direction: null,
    targetIndex: null
  };
  if (event.pointerId !== undefined && book.setPointerCapture) {
    book.setPointerCapture(event.pointerId);
  }
}

function moveDrag(event) {
  const pointerId = event.pointerId ?? "mouse";
  if (!dragState || dragState.pointerId !== pointerId) return;
  const dx = event.clientX - dragState.startX;
  const dy = event.clientY - dragState.startY;
  const absX = Math.abs(dx);

  if (!dragState.active) {
    if (absX < 10 || absX < Math.abs(dy)) return;
    const direction = dx < 0 ? "next" : "prev";
    const targetIndex = currentIndex + (direction === "next" ? (isMobileView() ? 1 : 2) : (isMobileView() ? -1 : -2));
    if (targetIndex < 0 || targetIndex >= PAGES.length) return;

    resetZoom();
    isTurning = true;
    updateUI();
    dragState.active = true;
    dragState.direction = direction;
    dragState.targetIndex = displayStart(targetIndex);
    createTurn(dragState.targetIndex, direction);
    book.classList.add("dragging");
  }

  const width = book.getBoundingClientRect().width;
  dragState.progress = clamp(absX / (width * (isMobileView() ? 0.46 : 0.34)), 0, 1);
  updateTurnProgress(dragState.progress);
}

function endDrag(event) {
  const pointerId = event.pointerId ?? "mouse";
  if (!dragState || dragState.pointerId !== pointerId) return;
  const state = dragState;
  dragState = null;
  book.classList.remove("dragging");

  if (!state.active) {
    if (state.fromHitZone) return;
    const rect = book.getBoundingClientRect();
    const isRightHalf = event.clientX > rect.left + rect.width / 2;
    if (isRightHalf) nextPage();
    else prevPage();
    return;
  }

  const complete = state.progress > 0.26;
  const target = complete ? 1 : 0;
  const duration = Math.max(180, TURN_MS * Math.abs(target - state.progress));
  animateProgress(state.progress, target, duration, () => finishTurn(complete));
}

function cancelDrag() {
  if (!dragState || !dragState.active) {
    dragState = null;
    return;
  }
  const progress = dragState.progress;
  dragState = null;
  book.classList.remove("dragging");
  animateProgress(progress, 0, Math.max(180, TURN_MS * progress), () => finishTurn(false));
}

function openLightbox() {
  lightbox.hidden = false;
  setSpreadImages(currentIndex);
  resetZoom();
  document.getElementById("lightbox-close").focus();
}

function closeLightbox() {
  lightbox.hidden = true;
  resetZoom();
}

controls.prev.forEach((button) => button.addEventListener("click", prevPage));
controls.next.forEach((button) => button.addEventListener("click", nextPage));
controls.zoomOut.forEach((button) => button.addEventListener("click", () => changeZoom(-0.25)));
controls.zoomIn.forEach((button) => button.addEventListener("click", () => changeZoom(0.25)));
craftJumps.forEach((button) => {
  button.addEventListener("click", () => goToPage(Number(button.dataset.page) - 1));
});

document.getElementById("fullscreen-btn").addEventListener("click", openLightbox);
document.getElementById("lightbox-close").addEventListener("click", closeLightbox);
lightbox.addEventListener("click", (event) => {
  if (event.target === lightbox || event.target.id === "lightbox-stage") closeLightbox();
});

book.addEventListener("pointerdown", startDrag);
book.addEventListener("pointermove", moveDrag);
book.addEventListener("pointerup", endDrag);
book.addEventListener("pointercancel", cancelDrag);
book.addEventListener("mousedown", startDrag);
document.addEventListener("mousemove", moveDrag);
document.addEventListener("mouseup", endDrag);

document.addEventListener("keydown", (event) => {
  if (event.key === "ArrowRight" || event.key === "ArrowDown") {
    event.preventDefault();
    nextPage();
  }
  if (event.key === "ArrowLeft" || event.key === "ArrowUp") {
    event.preventDefault();
    prevPage();
  }
  if (event.key === "+" || event.key === "=") {
    event.preventDefault();
    changeZoom(0.25);
  }
  if (event.key === "-") {
    event.preventDefault();
    changeZoom(-0.25);
  }
  if (event.key === "Escape" && !lightbox.hidden) {
    closeLightbox();
  }
});

window.addEventListener("message", (event) => {
  if (event.origin !== window.location.origin) return;
  if (event.data && event.data.type === "goToPage") {
    goToPage(Number(event.data.index) || 0);
  }
});

function handleResponsiveModeChange() {
  if (isTurning) return;
  render(currentIndex);
}

if (mobileQuery.addEventListener) {
  mobileQuery.addEventListener("change", handleResponsiveModeChange);
} else if (mobileQuery.addListener) {
  mobileQuery.addListener(handleResponsiveModeChange);
}

buildThumbs();
render(0);
applyZoom();
loadCatalog();
connectCatalogSync();
startCatalogPolling();

</script>
</body>
</html>
